# AutoQuant ETL — GitHub Actions Cron
# Alternative to Railway/Render persistent scheduler.
# GitHub Actions has a 5-min cron resolution and may delay up to 15 min.

name: AutoQuant ETL

on:
  schedule:
    # Daily VAHAN extraction — 00:30 UTC (6:00 AM IST)
    - cron: '30 0 * * *'
    # Weekly backfill — 20:30 UTC Saturday (2:00 AM IST Sunday)
    - cron: '30 20 * * 6'
    # Monthly reconciliation — 04:30 UTC on 5th (10:00 AM IST)
    - cron: '30 4 5 * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - health

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  VERCEL_REVALIDATION_URL: ${{ secrets.VERCEL_REVALIDATION_URL }}
  VERCEL_REVALIDATION_SECRET: ${{ secrets.VERCEL_REVALIDATION_SECRET }}
  ENVIRONMENT: production
  LOG_LEVEL: INFO

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./etl

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Determine job type
        id: job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.job }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 0 * * *" ]; then
            echo "type=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 20 * * 6" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 4 5 * *" ]; then
            echo "type=monthly" >> $GITHUB_OUTPUT
          fi

      - name: Run ETL job
        run: python main.py ${{ steps.job.outputs.type }}
